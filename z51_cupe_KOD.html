<html> 
<body> 
<textarea cols="90" rows="24">
  <!DOCTYPE html>
<head>
  <title>Sprawdzanie danych Małgorzata</title>
  <meta charset="utf-8">
</head>
<body>
  <div style="color:red:font-size:50px;">
    <script language="JavaScript">
      do{
        var liczba1=prompt("n=","");
        var n_cup=parseFloat(liczba1);
      }
        while(n_cup<0);
      if(n_cup==0){silnia_cup=1;
                   document.write
                     ("n="+n_cup+"<br>"+n_cup"!="+silnia_cup);
                      }
        if(n_cup>0){silnia_cup=1;
                    for(i_cup=1;i_cup<=n_cup;i_cup++)
                    {silnia_cup=silnia_cup*i_cup;}
                    document.write
                      ("n="+n_cup+"<br>"+n_cup+"!="+silnia_cup);
                    </script>
  </div>
</body>
</html>
</textarea>
</body>
</html>
